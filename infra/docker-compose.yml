version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: music-saas-db
    restart: always
    environment:
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music123
      POSTGRES_DB: music_saas
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: